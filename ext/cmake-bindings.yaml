    - opencv2/optflow
    - opencv2/optflow-rb.cpp
  '"opencv_phase_unwrapping" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/phase_unwrapping
    - opencv2/phase_unwrapping-rb.cpp
  '"opencv_photo" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/photo
    - opencv2/photo-rb.cpp
  '"opencv_plot" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/plot-rb.cpp
  '"opencv_rapid" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/rapid-rb.cpp
  '"opencv_reg" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/reg
  '"opencv_saliency" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/saliency
    - opencv2/saliency-rb.cpp
  '"opencv_shape" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/shape
    - opencv2/shape-rb.cpp
  '"opencv_signal" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/signal
    - opencv2/signal-rb.cpp
  '"opencv_stereo" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/stereo
    - opencv2/stereo-rb.cpp
  '"opencv_stitching" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/stitching
    - opencv2/stitching-rb.cpp
  '"opencv_structured_light" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/structured_light
    - opencv2/structured_light-rb.cpp
  '"opencv_superres" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/superres
    - opencv2/superres-rb.cpp
  '"opencv_surface_matching" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/surface_matching
    - opencv2/surface_matching-rb.cpp
  '"opencv_text" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/text
    - opencv2/text-rb.cpp
  '"opencv_tracking" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/tracking
    - opencv2/tracking-rb.cpp
  '"opencv_video" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/video
    - opencv2/video-rb.cpp
  '"opencv_videoio" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/videoio
    - opencv2/videoio-rb.cpp
  '"opencv_videostab" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/videostab
    - opencv2/videostab-rb.cpp
  '"opencv_wechat_qrcode" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/wechat_qrcode-rb.cpp
  '"opencv_xfeatures2d" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/xfeatures2d
    - opencv2/xfeatures2d/nonfree-rb.cpp
    - opencv2/xfeatures2d-rb.cpp
  '"opencv_xfeatures2d" IN_LIST OpenCV_LIB_COMPONENTS AND "opencv_cudaarithm" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/xfeatures2d/cuda-rb.cpp
  '"opencv_ximgproc" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/ximgproc
    - opencv2/ximgproc-rb.cpp
  '"opencv_xobjdetect" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/xobjdetect-rb.cpp
  '"opencv_xphoto" IN_LIST OpenCV_LIB_COMPONENTS':
    - opencv2/xphoto
    - opencv2/xphoto-rb.cpp

# Skip files that exist on disk but shouldn't be compiled
# (e.g., require libraries not available in all builds)
skip:
  - opencv2/core/eigen-rb.cpp
  - opencv2/core/directx-rb.cpp
  - opencv2/datasets/track_vot-rb.cpp
  - opencv2/datasets/track_alov-rb.cpp
  - opencv2/ml/ml.inl-rb.cpp

include_dirs:
  - "."
